server {
    listen 80;
    listen [::]:80;
    server_name kreisphoto.de www.kreisphoto.de;

    root /var/www/home-bar;

    location ~ ^/\.well-known/acme-challenge/ {
        root /var/www/home-bar;
        default_type "text/plain";
        allow all;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name kreisphoto.de www.kreisphoto.de;

    root /var/www/home-bar;
    index index.html;

    access_log /var/log/nginx/home-bar-access.log;
    error_log /var/log/nginx/home-bar-error.log;

    ssl_certificate /etc/letsencrypt/live/kreisphoto.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kreisphoto.de/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/kreisphoto.de/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|json)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
